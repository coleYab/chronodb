run:
  timeout: 3m

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - prealloc

linters:
  enable:
    - errcheck
    - govet
    - gosimple
    - staticcheck
    - unused
    - ineffassign
    - unconvert
    - gocritic
    - misspell
    - prealloc
    - whitespace

linters-settings:
  gocritic:
    disabled-checks:
      - ifElseChain
  errcheck:
    exclude-functions:
      - (io.Closer).Close
